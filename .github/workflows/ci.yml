name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔎 Change Detection
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🧭 Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'web/**'
              - 'Dockerfile.web'
              - 'docker/nginx.conf'

  ai-governance:
    name: ai-governance
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: 🤖 Check AI governance assets
        run: python scripts/check_ai_assets.py

  backend-gate:
    name: backend-gate
    runs-on: ubuntu-latest
    needs: [ai-governance]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_analysis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finance_analysis_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/finance_analysis_test
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: 📦 Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: 📦 Install dependencies
        run: |
          for attempt in 1 2 3; do
            if uv sync --frozen --dev; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Dependency install failed after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Dependency install attempt ${attempt} failed, retrying in 15s..." >&2
            sleep 15
          done
      - name: ✅ Python syntax check
        run: uv run ./scripts/ci_gate.sh syntax
      - name: ✅ Flake8 critical checks
        run: uv run ./scripts/ci_gate.sh flake8
      - name: ✅ Local deterministic checks
        run: uv run ./scripts/ci_gate.sh deterministic
      - name: ✅ Offline test suite
        run: uv run ./scripts/ci_gate.sh offline-tests

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: [backend-gate]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐳 Build image
        run: |
          docker build -t stock-analysis:test -f Dockerfile .
          docker build -t stock-analysis-web:test -f Dockerfile.web .
          docker run --rm stock-analysis:test python -c "print('✅ Docker OK')"
          docker run --rm stock-analysis-web:test nginx -t
      - name: 🔍 Docker smoke imports
        run: |
          docker run --rm stock-analysis:test python -c "
          from finance_analysis.config import load_env; print('✅ config')
          from finance_analysis.database import DatabaseManager; print('✅ storage')
          from finance_analysis.notification.service import NotificationService; print('✅ notification')
          from finance_analysis.integrations.market_data import DataFetcherManager; print('✅ data_provider')
          from finance_analysis.analysis.stock_report_analyzer import StockReportAnalyzer; print('✅ analyzer')
          from finance_analysis.patches.eastmoney_patch import eastmoney_patch; print('✅ patch')
          from finance_analysis.interfaces.bot.dispatcher import CommandDispatcher; print('✅ bot')
          from finance_analysis.interfaces.api.app import app; print('✅ api')
          print('✅ All Docker imports OK')
          "
      - name: 🔍 Docker runtime path smoke
        run: |
          docker run --rm stock-analysis:test python - <<'PY'
          from finance_analysis.core.paths import (
              PROJECT_ROOT,
              TEMPLATES_DIR,
              STRATEGIES_DIR,
              ensure_data_directories,
              get_data_dir,
              get_log_app_dir,
              get_report_analysis_dir,
          )
          from finance_analysis.interfaces.api.app import create_app
          from finance_analysis.reporting.template_renderer import _resolve_templates_dir

          templates = _resolve_templates_dir()
          print('templates:', templates)
          assert templates.is_dir()
          assert (templates / 'report_markdown.j2').is_file()

          print('strategies:', STRATEGIES_DIR)
          assert STRATEGIES_DIR.is_dir()
          assert (PROJECT_ROOT / 'pyproject.toml').is_file()

          print('data_dir:', get_data_dir())
          ensure_data_directories()
          assert get_log_app_dir().is_dir()

          app = create_app()
          print('routes:', len(app.routes))
          assert len(app.routes) > 0

          reports = get_report_analysis_dir()
          test_file = reports / 'smoke.txt'
          test_file.write_text('ok', encoding='utf-8')
          assert test_file.read_text(encoding='utf-8') == 'ok'
          print('✅ Docker runtime paths OK')
          PY

  web-gate:
    name: web-gate
    runs-on: ubuntu-latest
    needs: [changes, ai-governance]
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: web
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml
      - name: 📦 Install
        run: pnpm install --frozen-lockfile
      - name: 🔎 Lint
        run: pnpm run lint
      - name: 🏗️ Build
        run: pnpm run build
