name: Network Smoke

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

concurrency:
  group: network-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: 📦 Install dependencies
        run: uv sync --frozen --dev

      - name: 🌐 Run pytest network smoke (non-blocking)
        continue-on-error: true
        run: |
          set -o pipefail
          uv run python -m pytest -m network -q | tee pytest-network.log

      - name: 🚀 Run quick smoke (non-blocking)
        continue-on-error: true
        run: |
          set -o pipefail
          ./scripts/test.sh quick --no-notify | tee quick-smoke.log

      - name: 📤 Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: network-smoke-logs-${{ github.run_number }}
          path: |
            pytest-network.log
            quick-smoke.log
          if-no-files-found: ignore
