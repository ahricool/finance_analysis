name: Docker Manual Publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag version (e.g., v1.0.0, latest)'
        required: true
        default: 'v1.0.0'

concurrency:
  group: docker-manual-publish-${{ github.ref }}-${{ inputs.image_tag }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  GHCR_WEB_IMAGE_NAME: ${{ github.repository }}_web
  DOCKERHUB_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
  DOCKERHUB_WEB_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-web
  BUILDKIT_IMAGE: moby/buildkit:v0.31.0

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release inputs
        run: |
          if [[ "${{ inputs.image_tag }}" =~ [[:space:]] ]]; then
            echo "image_tag must not contain spaces"
            exit 1
          fi

      - name: Set up QEMU for multi-platform build
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=${{ env.BUILDKIT_IMAGE }}
            network=host

      # 登录到 GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 登录到 Docker Hub（需要预先设置 secrets.DOCKERHUB_USERNAME 和 secrets.DOCKERHUB_TOKEN）
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract backend metadata for GHCR
        id: meta-ghcr-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest
          flavor: |
            latest=false

      - name: Extract web metadata for GHCR
        id: meta-ghcr-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest
          flavor: |
            latest=false

      - name: Extract backend metadata for Docker Hub
        id: meta-dockerhub-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest
          flavor: |
            latest=false

      - name: Extract web metadata for Docker Hub
        id: meta-dockerhub-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest
          flavor: |
            latest=false

      - name: Pre-publish docker smoke
        run: |
          docker build -t stock-analysis:manual -f Dockerfile .
          docker build -t stock-analysis-web:manual -f Dockerfile.web .
          docker run --rm stock-analysis:manual python -c "
          from finance_analysis.config import load_env; print('ok-config')
          from finance_analysis.database import DatabaseManager; print('ok-storage')
          from finance_analysis.notification.service import NotificationService; print('ok-notification')
          from finance_analysis.integrations.market_data import DataFetcherManager; print('ok-data-provider')
          from finance_analysis.analysis.stock_report_analyzer import StockReportAnalyzer; print('ok-analyzer')
          print('manual-smoke-ok')
          "
          docker run --rm stock-analysis-web:manual nginx -t

      - name: Build and push backend multi-arch images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta-ghcr-backend.outputs.tags }}
            ${{ steps.meta-dockerhub-backend.outputs.tags }}
          labels: ${{ steps.meta-ghcr-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push web multi-arch images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta-ghcr-web.outputs.tags }}
            ${{ steps.meta-dockerhub-web.outputs.tags }}
          labels: ${{ steps.meta-ghcr-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Generate summary
        run: |
          echo "### Docker images built and pushed successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend GHCR: \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web GHCR: \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_WEB_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend Docker Hub: \`${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web Docker Hub: \`${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_WEB_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags: ${{ inputs.image_tag }}, latest" >> "$GITHUB_STEP_SUMMARY"
          echo "- Platforms: linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pull commands" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:${{ inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_WEB_IMAGE_NAME }}:${{ inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:${{ inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_WEB_IMAGE_NAME }}:${{ inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
