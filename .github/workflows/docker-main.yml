name: Docker Main Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-main-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  GHCR_WEB_IMAGE_NAME: ${{ github.repository }}_web
  GHCR_QLIB_IMAGE_NAME: ${{ github.repository }}_qlib
  BUILDKIT_IMAGE: moby/buildkit:v0.31.0

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=${{ env.BUILDKIT_IMAGE }}
            network=host

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short
            type=sha,format=long

      - name: Extract web metadata
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short
            type=sha,format=long

      - name: Extract Qlib worker metadata
        id: meta-qlib
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_QLIB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short
            type=sha,format=long

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push Qlib worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: qlib_worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-qlib.outputs.tags }}
          labels: ${{ steps.meta-qlib.outputs.labels }}
          cache-from: type=gha,scope=qlib
          cache-to: type=gha,mode=max,scope=qlib

      - name: Publish summary
        run: |
          echo "### Docker main images published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend GHCR: \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web GHCR: \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_WEB_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Qlib GHCR: \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_QLIB_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags: \`latest\`, \`main\`, commit SHA tags" >> "$GITHUB_STEP_SUMMARY"
