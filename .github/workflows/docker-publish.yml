name: Docker Release Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag in semver format, e.g. v3.0.6'
        required: true
        type: string

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  GHCR_WEB_IMAGE_NAME: ${{ github.repository }}_web
  DOCKERHUB_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
  DOCKERHUB_WEB_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-web
  HAS_DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}
  HAS_DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME != '' && 'true' || 'false' }}
  BUILDKIT_IMAGE: moby/buildkit:v0.31.0

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_analysis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finance_analysis_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/finance_analysis_test
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release ref
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
            [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
            git fetch --tags --force
            git rev-parse "$RELEASE_TAG" >/dev/null
            git checkout "$RELEASE_TAG"
            echo "Using manual release tag: $RELEASE_TAG"
          else
            echo "Using event ref: ${GITHUB_REF_NAME}"
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install backend gate dependencies
        run: |
          uv sync --frozen --dev

      - name: Run backend gate before publish
        run: uv run ./scripts/ci_gate.sh

      - name: Validate release docs
        run: |
          test -f README.md
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            [[ "${{ inputs.release_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
            VERSION="${{ inputs.release_tag }}"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            echo "Unsupported trigger type"
            exit 1
          fi
          # Validate using annotated tag message instead of CHANGELOG entry.
          # Requires: git tag -a <version> -m "<release notes>"
          TAG_BODY="$(git tag -l --format='%(contents)' "$VERSION")"
          if [[ -z "${TAG_BODY// }" ]]; then
            echo "ERROR: Tag $VERSION has no annotation message."
            echo "Use: git tag -a $VERSION -m '<release notes>' (annotated tag required)"
            exit 1
          fi
          echo "Tag annotation found for $VERSION ($(echo "$TAG_BODY" | wc -l) lines). Gate passed."

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=${{ env.BUILDKIT_IMAGE }}
            network=host

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.HAS_DOCKERHUB_TOKEN == 'true' && env.HAS_DOCKERHUB_USERNAME == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract backend metadata for GHCR
        id: meta-ghcr-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=raw,value=${{ inputs.release_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,format=short
            type=sha,format=long

      - name: Extract web metadata for GHCR
        id: meta-ghcr-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=raw,value=${{ inputs.release_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,format=short
            type=sha,format=long

      - name: Extract backend metadata for Docker Hub
        if: ${{ env.HAS_DOCKERHUB_TOKEN == 'true' && env.HAS_DOCKERHUB_USERNAME == 'true' }}
        id: meta-dockerhub-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=raw,value=${{ inputs.release_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,format=short
            type=sha,format=long

      - name: Extract web metadata for Docker Hub
        if: ${{ env.HAS_DOCKERHUB_TOKEN == 'true' && env.HAS_DOCKERHUB_USERNAME == 'true' }}
        id: meta-dockerhub-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=raw,value=${{ inputs.release_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,format=short
            type=sha,format=long

      - name: Pre-publish docker smoke
        run: |
          docker build -t stock-analysis:release -f Dockerfile .
          docker build -t stock-analysis-web:release -f Dockerfile.web .
          docker run --rm stock-analysis:release python -c "
          from finance_analysis.config import load_env; print('ok-config')
          from finance_analysis.database import DatabaseManager; print('ok-storage')
          from finance_analysis.notification.service import NotificationService; print('ok-notification')
          from finance_analysis.integrations.market_data import DataFetcherManager; print('ok-data-provider')
          from finance_analysis.analysis.stock_report_analyzer import StockReportAnalyzer; print('ok-analyzer')
          print('release-smoke-ok')
          "
          docker run --rm stock-analysis-web:release nginx -t

      - name: Build and push backend release images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta-ghcr-backend.outputs.tags }}
            ${{ steps.meta-dockerhub-backend.outputs.tags }}
          labels: ${{ steps.meta-ghcr-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push web release images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta-ghcr-web.outputs.tags }}
            ${{ steps.meta-dockerhub-web.outputs.tags }}
          labels: ${{ steps.meta-ghcr-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Publish summary
        run: |
          echo "### Docker release published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend GHCR: \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web GHCR: \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_WEB_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ env.HAS_DOCKERHUB_TOKEN }}" == "true" && "${{ env.HAS_DOCKERHUB_USERNAME }}" == "true" ]]; then
            echo "- Backend Docker Hub: \`${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Web Docker Hub: \`${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_WEB_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Docker Hub: skipped (missing \`DOCKERHUB_TOKEN\` / \`DOCKERHUB_USERNAME\` secret)" >> "$GITHUB_STEP_SUMMARY"
          fi
