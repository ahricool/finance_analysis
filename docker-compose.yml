# ===================================
# Finance Analysis - Docker Compose
# ===================================
#

name: finance-analysis

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # 仅暴露给宿主机做本地调试，生产环境可移除此行
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI 服务 ─────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # command: ["uv", "run", "main.py"]
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - WEBUI_HOST=0.0.0.0
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./data:/workspace/data
      - ./logs:/workspace/logs
      - ./reports:/workspace/reports
      - ./.env:/workspace/.env
      - ./strategies:/workspace/strategies:ro
      
      - ./static:/workspace/static
      - ./api:/workspace/api
      - ./data_provider:/workspace/data_provider
      - ./bot:/workspace/bot
      - ./src:/workspace/src
      - ./strategies:/workspace/strategies
      - ./.env:/workspace/.env
      - ./main.py:/workspace/main.py

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    name: finance-analysis-postgres-data
