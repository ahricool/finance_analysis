name: finance-analysis

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-analysis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: finance-analysis-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  server:
    image: ghcr.io/ahricool/finance_analysis:latest
    container_name: finance-analysis-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    volumes:
      - ./data:/workspace/data
      - ./.env:/workspace/.env:ro
      - ./strategies:/workspace/strategies:ro

  web:
    image: ghcr.io/ahricool/finance_analysis-web:latest
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: finance-analysis-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8000:80"

  worker:
    image: ghcr.io/ahricool/finance_analysis:latest
    container_name: finance-analysis-celery
    restart: unless-stopped
    command: ["celery", "-A", "finance_analysis.tasks.celery.app", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/workspace/data
      - ./.env:/workspace/.env:ro
      - ./strategies:/workspace/strategies:ro

volumes:
  postgres_data:
    name: finance-analysis-postgres-data
  redis_data:
    name: finance-analysis-redis-data
