name: finance-analysis

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-analysis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: finance-analysis-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  server:
    image: ghcr.io/ahricool/finance_analysis:latest
    container_name: finance-analysis-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: "8000"
      API_PORT: "8000"
      HEALTHCHECK_URL: http://127.0.0.1:8000/api/health
      HEALTHCHECK_FALLBACK_URL: http://127.0.0.1:8000/health
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./data:/workspace/data
      - ./logs:/workspace/logs
      - ./reports:/workspace/reports
      - ./.env:/workspace/.env:ro
      - ./strategies:/workspace/strategies:ro

  celery_worker:
    image: ghcr.io/ahricool/finance_analysis:latest
    container_name: finance-analysis-celery
    restart: unless-stopped
    command: ["celery", "-A", "src.celery_app.app", "worker"]
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/workspace/data
      - ./logs:/workspace/logs
      - ./reports:/workspace/reports
      - ./.env:/workspace/.env:ro
      - ./strategies:/workspace/strategies:ro

volumes:
  postgres_data:
    name: finance-analysis-postgres-data
  redis_data:
    name: finance-analysis-redis-data
