# Alembic — database migrations (PostgreSQL)
# https://alembic.sqlalchemy.org/

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
version_path_separator = os

# Overridden at runtime in env.py from DATABASE_URL / Config.get_db_url()
sqlalchemy.url = postgresql+psycopg2://placeholder:placeholder@127.0.0.1:5432/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
