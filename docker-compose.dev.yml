name: finance-analysis-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-analysis-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: finance-analysis-dev-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data_dev:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  server:
    image: ghcr.io/ahricool/finance_analysis:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-analysis-dev-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    volumes:
      - ./data:/workspace/data
      - ./.env:/workspace/.env
      - ./strategies:/workspace/strategies:ro
      - ./src:/workspace/src
      - ./main.py:/workspace/main.py

  web:
    image: ghcr.io/ahricool/finance_analysis_web:latest
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: finance-analysis-dev-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8000:80"

  worker:
    image: ghcr.io/ahricool/finance_analysis:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-analysis-dev-celery
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "finance_analysis.tasks.celery.app:celery_app",
        "worker",
        "--loglevel=INFO",
        "-Q",
        "celery,alerts,analysis,ingestion,maintenance",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/workspace/data
      - ./.env:/workspace/.env
      - ./strategies:/workspace/strategies:ro
      - ./src:/workspace/src
      - ./main.py:/workspace/main.py

  beat:
    image: ghcr.io/ahricool/finance_analysis:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-analysis-dev-celery-beat
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "finance_analysis.tasks.celery.app:celery_app",
        "beat",
        "--loglevel=INFO",
        "--schedule=/workspace/data/celerybeat-schedule",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/workspace/data
      - ./.env:/workspace/.env
      - ./strategies:/workspace/strategies:ro
      - ./src:/workspace/src
      - ./main.py:/workspace/main.py

  streamer:
    image: ghcr.io/ahricool/finance_analysis:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-analysis-dev-streamer
    restart: unless-stopped
    command: ["finance-analysis-stream"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/workspace/data
      - ./.env:/workspace/.env:ro
      - ./src:/workspace/src

volumes:
  postgres_data_dev:
    name: finance-analysis-dev-postgres-data
  redis_data_dev:
    name: finance-analysis-dev-redis-data
