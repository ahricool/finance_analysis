name: finance-analysis-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-analysis-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    image: ${FINANCE_ANALYSIS_IMAGE:-ghcr.io/zhulinsen/daily_stock_analysis:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-analysis-dev-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      WEBUI_HOST: 0.0.0.0
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./data:/workspace/data
      - ./logs:/workspace/logs
      - ./reports:/workspace/reports
      - ./.env:/workspace/.env
      - ./strategies:/workspace/strategies:ro
      - ./static:/workspace/static
      - ./api:/workspace/api
      - ./data_provider:/workspace/data_provider
      - ./bot:/workspace/bot
      - ./src:/workspace/src
      - ./main.py:/workspace/main.py

volumes:
  postgres_data_dev:
    name: finance-analysis-dev-postgres-data
