# ===================================
# A股自选股智能分析系统 - Docker Compose
# ===================================
#
# 使用方式:
#   docker-compose -f ./docker/docker-compose.yml up -d
#
# 数据库：使用独立 postgres 服务；连接串由 DATABASE_URL 传入 app 容器。
# 如需修改 PostgreSQL 密码，同步更新 .env 中的 DATABASE_URL 和 POSTGRES_PASSWORD。

name: daily-stock-analysis

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dsa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dsa_db}
      POSTGRES_USER: ${POSTGRES_USER:-dsa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dsa_password}
      TZ: Asia/Shanghai
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # 仅暴露给宿主机做本地调试，生产环境可移除此行
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dsa} -d ${POSTGRES_DB:-dsa_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI 服务 ─────────────────────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dsa-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    env_file:
      - ../.env
    environment:
      - TZ=Asia/Shanghai
      - WEBUI_HOST=0.0.0.0
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-dsa}:${POSTGRES_PASSWORD:-dsa_password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-dsa_db}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../reports:/app/reports
      - ../.env:/app/.env
      - ../strategies:/app/strategies:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:
    name: dsa-postgres-data
